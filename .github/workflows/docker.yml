# ============================================================================
# Docker Image Build & Push to Docker Hub
# Triggers:
#   - On push to main (builds :latest + :sha-<short>)
#   - On git tag v*.*.* (builds :v*.*.* + :latest)
#   - Manually via workflow_dispatch
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME  - e.g. cshdotcom
#   DOCKERHUB_TOKEN     - Docker Hub Access Token (https://hub.docker.com/settings/security)
# ============================================================================

name: Docker Build & Push

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**.md'
      - 'docs/**'
  tags:
    - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Image tag (default: latest)'
        required: false
        default: 'latest'

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          # Get version from package.json
          PKG_VERSION=$(grep -oP '"version"\s*:\s*"\K[^"]+' package.json | head -1)
          GIT_SHA=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          # Determine tag set based on trigger
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            # Tag push: use the git tag name
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            echo "version_tag=$TAG_NAME" >> $GITHUB_OUTPUT
            echo "tags=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/nav:$TAG_NAME,docker.io/${{ secrets.DOCKERHUB_USERNAME }}/nav:latest" >> $GITHUB_OUTPUT
          elif [[ -n "${{ github.event.inputs.version }}" && "${{ github.event.inputs.version }}" != "latest" ]]; then
            TAG_NAME="${{ github.event.inputs.version }}"
            echo "version_tag=$TAG_NAME" >> $GITHUB_OUTPUT
            echo "tags=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/nav:$TAG_NAME,docker.io/${{ secrets.DOCKERHUB_USERNAME }}/nav:latest" >> $GITHUB_OUTPUT
          else
            # Branch push: tag with package version + sha
            echo "version_tag=v$PKG_VERSION" >> $GITHUB_OUTPUT
            echo "tags=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/nav:v$PKG_VERSION,docker.io/${{ secrets.DOCKERHUB_USERNAME }}/nav:sha-$GIT_SHA,docker.io/${{ secrets.DOCKERHUB_USERNAME }}/nav:latest" >> $GITHUB_OUTPUT
          fi

          echo "git_sha=$GIT_SHA" >> $GITHUB_OUTPUT
          echo "build_date=$BUILD_DATE" >> $GITHUB_OUTPUT
          echo "pkg_version=$PKG_VERSION" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.title=nav
            org.opencontainers.image.description=发现导航 - lightweight navigation website
            org.opencontainers.image.version=${{ steps.meta.outputs.version_tag }}
            org.opencontainers.image.revision=${{ steps.meta.outputs.git_sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.build_date }}
            org.opencontainers.image.source=https://github.com/cshdotcom/nav-cshll
            org.opencontainers.image.licenses=GPL-3.0
          cache-from: type=registry,ref=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/nav:buildcache
          cache-to: type=registry,ref=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/nav:buildcache,mode=max
