# ============================================================================
# nginx config for 发现导航 (Nav) - Angular SPA static site
# - SPA fallback to /index.html for client-side routes
# - Gzip compression for text assets
# - Long cache headers for hashed static assets (outputHashing: all)
# - Security headers
# ============================================================================

server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ---------- Gzip ----------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/rss+xml
        image/svg+xml
        font/woff
        font/woff2
        application/font-woff
        application/font-woff2;

    # ---------- Security headers ----------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ---------- Static asset caching ----------
    # Hashed asset files (Angular outputHashing: all) can be cached aggressively
    location ~* \.(?:js|css|woff2?|ttf|eot|otf|png|jpg|jpeg|gif|webp|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        access_log off;
        try_files $uri =404;
    }

    # ---------- index.html - never cache ----------
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # ---------- SPA fallback ----------
    # For Angular with hashMode=false (HTML5 routing), all unknown paths
    # fall back to index.html so client-side router can handle them.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---------- Health check endpoint ----------
    location = /healthz {
        access_log off;
        add_header Content-Type "text/plain";
        return 200 "ok\n";
    }

    # ---------- Disable dotfile access ----------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
